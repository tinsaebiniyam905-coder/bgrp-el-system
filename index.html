<!DOCTYPE html>
<html lang="am">
<head>
<meta charset="UTF-8" />
<title>የፖሊስ ሪፖርት ሲስተም</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<!-- LIBRARIES -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />

<style>
body{margin:0;font-family:'Segoe UI';background:linear-gradient(135deg,#1f4037,#99f2c8);} 
.container{max-width:1100px;margin:auto;padding:20px;} 
.card{background:white;border-radius:15px;padding:20px;margin-top:20px;box-shadow:0 10px 25px rgba(0,0,0,0.2);} 
input,textarea{width:100%;padding:10px;margin:6px 0;border-radius:8px;border:1px solid #ccc;} 
button{background:#28a745;color:white;padding:10px;border:none;border-radius:8px;cursor:pointer;} 
.hidden{display:none;} 
.report-item{background:#f1f1f1;margin:10px 0;padding:10px;border-radius:10px;cursor:pointer;} 
#map{height:300px;margin-top:10px;border-radius:10px;} 
</style>
</head>

<body>
<div class="container">
<h2>🇪🇹 የፖሊስ ሪፖርት ሲስተም</h2>
<h4 style="color:gold;font-weight:bold;">ቤንሻንጉል ጉምዝ ክልል ፖሊስ ኮሚሽን</h4>

<!-- LOGIN -->
<div class="card" id="loginBox">
<input id="email" placeholder="email" />
<input id="password" type="password" placeholder="password" />
<button id="loginBtn">Login</button>
</div>

<!-- WEREDA DASHBOARD -->
<div id="weredaDash" class="hidden">
<div class="card">
<h3>📋 ሪፖርት ፎርም</h3>
<input id="region" placeholder="ክልል" />
<input id="zone" placeholder="ዞን" />
<input id="wereda" placeholder="ወረዳ" />
<input id="station" placeholder="ጣቢያ" />
<input id="crime" placeholder="ወንጀል" />
<textarea id="desc" placeholder="መግለጫ"></textarea>
<input id="date" type="datetime-local" />
<button id="sendBtn">📤 ላክ</button>
</div>

<div class="card">
<h3>📂 የላኩት ሪፖርቶች</h3>
<div id="myReports"></div>
</div>
</div>

<!-- POLICE DASHBOARD -->
<div id="policeDash" class="hidden">
<div class="card">
<h3>🔔 <span id="notify">0</span></h3>
<div id="reports"></div>
<canvas id="chart"></canvas>
<div id="map"></div>
<div id="ai"></div>
</div>
</div>

<!-- LOGOUT BUTTON -->
<div style="position:fixed;top:10px;right:10px;">
<button id="logoutBtn" style="background:red;">Logout</button>
</div>

</div>

<script type="module">
import { db, auth, collection, addDoc, onSnapshot } from "./firebase.js";
import { signInWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const loginBtn=document.getElementById("loginBtn");
const loginBox=document.getElementById("loginBox");
const weredaDash=document.getElementById("weredaDash");
const policeDash=document.getElementById("policeDash");
const reportsDiv=document.getElementById("reports");
const notify=document.getElementById("notify");
const aiDiv=document.getElementById("ai");
const myReports=document.getElementById("myReports");
const sendBtn=document.getElementById("sendBtn");
const logoutBtn=document.getElementById("logoutBtn");

let allReports=[];
let map,chart;

// 🔐 AUTO LOGIN (NO REFRESH LOGIN)
import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

onAuthStateChanged(auth,(user)=>{
 if(user){
  loginBox.style.display="none";

  const email=user.email;

  if(email.includes("wereda")){
    weredaDash.classList.remove("hidden");
    loadMyReports();
  }else{
    policeDash.classList.remove("hidden");
    initMap();
    realtime();
  }
 }else{
  loginBox.style.display="block";
 }
});

// 🔓 LOGOUT
logoutBtn.onclick=async()=>{
 await signOut(auth);
 location.reload();
};

// 📤 SEND REPORT
sendBtn.onclick=async()=>{
 const data={
  region:region.value||"-",
  zone:zone.value||"-",
  wereda:wereda.value||"-",
  station:station.value||"-",
  crime:crime.value||"-",
  desc:desc.value||"-",
  date:date.value||"-",
 };

 await addDoc(collection(db,"reports"),data);
 alert("✅ ተልኳል");
};

// 📂 WEREDA VIEW OWN REPORTS
function loadMyReports(){
 onSnapshot(collection(db,"reports"),(snap)=>{
  myReports.innerHTML="";
  snap.forEach(doc=>{
   const d=doc.data();
   myReports.innerHTML+=`<div class='report-item'>${d.zone}-${d.crime}</div>`;
  });
 });
}

// 📡 POLICE REALTIME
function realtime(){
 onSnapshot(collection(db,"reports"),(snap)=>{
  allReports=[];
  snap.forEach(doc=>allReports.push(doc.data()));
  notify.innerText=snap.size;
  render();
 });
}

function initMap(){
 map=L.map('map').setView([9,38],6);
 L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
}

function render(){
 reportsDiv.innerHTML="";
 let zones={};

 allReports.forEach((d,i)=>{
  reportsDiv.innerHTML+=`<div class='report-item' onclick='viewReport(${i})'>${d.zone||"-"} - ${d.crime||"-"}</div>`;
  zones[d.zone]=(zones[d.zone]||0)+1;
 });

 drawChart(zones);
 aiPrediction(zones);
}

// 🔍 FULL REPORT
window.viewReport=function(i){
 const d = allReports[i];
 const w = window.open("");
 w.document.write(`
 <h2>📄 ሙሉ ሪፖርት</h2>
 <p>ክልል: ${d.region||"-"}</p>
 <p>ዞን: ${d.zone||"-"}</p>
 <p>ወረዳ: ${d.wereda||"-"}</p>
 <p>ጣቢያ: ${d.station||"-"}</p>
 <p>ወንጀል: ${d.crime||"-"}</p>
 <p>መግለጫ: ${d.desc||"-"}</p>
 <p>ቀን: ${d.date||"-"}</p>
 <button onclick="window.print()">🖨 Print</button>
 `);
};

function drawChart(z){
 if(chart) chart.destroy();
 chart=new Chart(document.getElementById("chart"),{
  type:'bar',
  data:{labels:Object.keys(z),datasets:[{data:Object.values(z)}]}
 });
}

function aiPrediction(z){
 let max=0,hot="";
 for(let k in z){if(z[k]>max){max=z[k];hot=k}}
 aiDiv.innerHTML=`🔥 hotspot: ${hot}`;
}

</script>
</body>
</html>
