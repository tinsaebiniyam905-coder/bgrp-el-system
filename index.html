<!DOCTYPE html>
<html lang="am">
<head>
<meta charset="UTF-8" />
<title>የፖሊስ ሪፖርት ሲስተም</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{margin:0;font-family:'Segoe UI';background:linear-gradient(135deg,#1f4037,#99f2c8);} 
.container{max-width:1100px;margin:auto;padding:20px;} 
.card{background:white;border-radius:15px;padding:20px;margin-top:20px;box-shadow:0 10px 25px rgba(0,0,0,0.2);} 
input,textarea{width:100%;padding:10px;margin:6px 0;border-radius:8px;border:1px solid #ccc;} 
button{background:#28a745;color:white;padding:10px;border:none;border-radius:8px;cursor:pointer;} 
.hidden{display:none;} 
.report-item{background:#f1f1f1;margin:10px 0;padding:10px;border-radius:10px;cursor:pointer;} 
</style>
</head>

<body>
<div class="container">

<h2>🇪🇹 የፖሊስ ሪፖርት ሲስተም</h2>

<div class="card" id="loginBox">
<input id="email" placeholder="email" />
<input id="password" type="password" placeholder="password" />
<button id="loginBtn">Login</button>
</div>

<div id="weredaDash" class="hidden">
<div class="card">
<h3>📋 ሪፖርት</h3>
<input id="region" placeholder="ክልል" />
<input id="zone" placeholder="ዞን" />
<input id="wereda" placeholder="ወረዳ" />
<input id="station" placeholder="ጣቢያ" />
<input id="crime" placeholder="ወንጀል" />
<textarea id="desc" placeholder="መግለጫ"></textarea>
<button id="sendBtn">📤 ላክ</button>
</div>

<div class="card">
<h3>📂 የእርስዎ ሪፖርቶች</h3>
<div id="myReports"></div>
</div>
</div>

<div id="policeDash" class="hidden">
<div class="card">
<h3>📊 ሁሉም ሪፖርት</h3>
<div id="reports"></div>
</div>
</div>

<button id="logoutBtn" style="position:fixed;top:10px;right:10px;background:red;">Logout</button>
</div>

<script type="module">
import { db, auth, collection, addDoc, onSnapshot } from "./firebase.js";
import { signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const loginBtn=document.getElementById("loginBtn");
const loginBox=document.getElementById("loginBox");
const weredaDash=document.getElementById("weredaDash");
const policeDash=document.getElementById("policeDash");
const myReports=document.getElementById("myReports");
const reportsDiv=document.getElementById("reports");
const logoutBtn=document.getElementById("logoutBtn");

let currentUser=null;
let allReports=[];

// LOGIN
loginBtn.onclick=async()=>{
 const email=document.getElementById("email").value;
 const password=document.getElementById("password").value;
 try{
  await signInWithEmailAndPassword(auth,email,password);
 }catch(e){
  alert(e.message);
 }
};

// AUTO LOGIN FIX (IMPORTANT)
onAuthStateChanged(auth,(user)=>{
 if(user){
  currentUser=user;
  loginBox.style.display="none";

  // reset
  weredaDash.classList.add("hidden");
  policeDash.classList.add("hidden");

  // 🔐 ROLE BASED (FIXED EXACT EMAIL)
  if(user.email === "policeregion551@gmail.com"){
    // 👉 ክልል ፖሊስ
    policeDash.classList.remove("hidden");
    loadAllReports();

  }else{
    // 👉 ወረዳ (ሌሎች ሁሉ)
    weredaDash.classList.remove("hidden");
    loadMyReports();
  }
 }else{
  loginBox.style.display="block";
 }
});

// LOGOUT
logoutBtn.onclick=async()=>{
 await signOut(auth);
};

// SEND REPORT (FIXED IDs)
document.getElementById("sendBtn").onclick=async()=>{
 if(!currentUser) return alert("login first");

 const data={
  region:document.getElementById("region").value || "",
  zone:document.getElementById("zone").value || "",
  wereda:document.getElementById("wereda").value || "",
  station:document.getElementById("station").value || "",
  crime:document.getElementById("crime").value || "",
  desc:document.getElementById("desc").value || "",
  reporterEmail:currentUser.email,
  createdAt:new Date().toISOString()
 };

 await addDoc(collection(db,"reports"),data);
 alert("✅ ተልኳል");
};

// WEREDA OWN REPORTS (FIXED)
function loadMyReports(){
 onSnapshot(collection(db,"reports"),(snap)=>{
  myReports.innerHTML="";
  allReports=[];

  snap.forEach(doc=>{
   const d={id:doc.id,...doc.data()};

   if(d.reporterEmail===currentUser.email){
     allReports.push(d);

     myReports.innerHTML+=`<div class='report-item' onclick='viewReport("${d.id}")'>
     ${d.crime} - ${d.zone}
     </div>`;
   }
  });
 });
}

// POLICE ALL REPORTS (FIXED)
function loadAllReports(){
 onSnapshot(collection(db,"reports"),(snap)=>{
  reportsDiv.innerHTML="";
  allReports=[];

  snap.forEach(doc=>{
   const d={id:doc.id,...doc.data()};
   allReports.push(d);

   reportsDiv.innerHTML+=`<div class='report-item' onclick='viewReport("${d.id}")'>
   ${d.crime} - ${d.zone}
   </div>`;
  });
 });
}

// VIEW REPORT (FIXED UNDEFINED BUG)
window.viewReport=function(id){
 const r = allReports.find(x=>x.id===id);

 if(!r){
  alert("❌ ሪፖርት አልተገኘም");
  return;
 }

 const w = window.open();
 w.document.write(`
 <h2>📄 ሙሉ ሪፖርት</h2>
 <p>ክልል: ${r.region}</p>
 <p>ዞን: ${r.zone}</p>
 <p>ወረዳ: ${r.wereda}</p>
 <p>ጣቢያ: ${r.station}</p>
 <p>ወንጀል: ${r.crime}</p>
 <p>መግለጫ: ${r.desc}</p>
 <button onclick="window.print()">🖨 Print</button>
 `);
};

</script>
</body>
</html>
