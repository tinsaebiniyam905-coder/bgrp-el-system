<!DOCTYPE html>
<html lang="am">
<head>
<meta charset="UTF-8" />
<title>የፖሊስ ሪፖርት ሲስተም</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<style>
body{margin:0;font-family:'Segoe UI';background:linear-gradient(135deg,#1f4037,#99f2c8);} 
.container{max-width:1100px;margin:auto;padding:20px;} 
.card{background:white;border-radius:15px;padding:20px;margin-top:20px;box-shadow:0 10px 25px rgba(0,0,0,0.2);} 
input,textarea{width:100%;padding:10px;margin:6px 0;border-radius:8px;border:1px solid #ccc;} 
button{background:#28a745;color:white;padding:10px;border:none;border-radius:8px;cursor:pointer;} 
.hidden{display:none;} 
.report-item{background:#f1f1f1;margin:10px 0;padding:10px;border-radius:10px;cursor:pointer;} 
.new{background:#ffcccc;border-left:5px solid red;}
.read{background:#e7f5ff;}
</style>
</head>

<body>
<div class="container">

<h2 style="text-align:center;">🇪🇹 የፖሊስ ሪፖርት ሲስተም</h2>

<div class="card" id="loginBox">
<input id="email" placeholder="email" />
<input id="password" type="password" placeholder="password" />
<button id="loginBtn">Login</button>
</div>

<!-- WEREDA -->
<div id="weredaDash" class="hidden">
<div class="card">
<h3>📋 ሪፖርት ፎርም</h3>
<input id="region" placeholder="ክልል" />
<input id="zone" placeholder="ዞን" />
<input id="wereda" placeholder="ወረዳ" />
<input id="station" placeholder="ጣቢያ" />
<input id="crime" placeholder="ወንጀል" />
<textarea id="desc" placeholder="መግለጫ"></textarea>
<button id="sendBtn">📤 ላክ</button>
</div>

<div class="card">
<h3>📂 የላኩት</h3>
<div id="myReports"></div>
</div>
</div>

<!-- POLICE -->
<div id="policeDash" class="hidden">
<div class="card">
<h3>🔔 <span id="notify">0</span></h3>
<div id="reports"></div>
</div>
</div>

<button id="logoutBtn" style="position:fixed;top:10px;right:10px;background:red;">Logout</button>

</div>

<script type="module">

// ✅ FIXED IMPORTS
import { db, auth } from "./firebase.js";
import { 
  collection, 
  addDoc, 
  onSnapshot 
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

import { 
  signInWithEmailAndPassword, 
  signOut, 
  onAuthStateChanged 
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const loginBtn=document.getElementById("loginBtn");
const loginBox=document.getElementById("loginBox");
const weredaDash=document.getElementById("weredaDash");
const policeDash=document.getElementById("policeDash");
const reportsDiv=document.getElementById("reports");
const notify=document.getElementById("notify");
const sendBtn=document.getElementById("sendBtn");
const logoutBtn=document.getElementById("logoutBtn");
const myReports=document.getElementById("myReports");

let allReports=[];
let currentUser=null;

// LOGIN
loginBtn.onclick=async()=>{
 const email=emailInput.value;
 const password=passwordInput.value;
 try{
  await signInWithEmailAndPassword(auth,email,password);
 }catch(e){
  alert(e.message);
 }
};

// AUTH
onAuthStateChanged(auth,(user)=>{
 if(user){
  currentUser=user;
  loginBox.style.display="none";

  if(user.email.includes("wereda")){
    weredaDash.classList.remove("hidden");
    loadMyReports();
  }else{
    policeDash.classList.remove("hidden");
    realtime();
  }
 }else{
  loginBox.style.display="block";
 }
});

// LOGOUT
logoutBtn.onclick=async()=>{
 await signOut(auth);
 location.reload();
};

// SEND REPORT
sendBtn.onclick=async()=>{
 const data={
  region:region.value,
  zone:zone.value,
  wereda:wereda.value,
  station:station.value,
  crime:crime.value,
  desc:desc.value,
  reporterEmail:currentUser.email,
  createdAt:new Date().toISOString()
 };

 await addDoc(collection(db,"reports"),data);
 alert("✅ ተልኳል");
};

// WEREDA ONLY OWN REPORTS
function loadMyReports(){
 onSnapshot(collection(db,"reports"),(snap)=>{
  myReports.innerHTML="";
  snap.forEach(doc=>{
    const r=doc.data();
    if(r.reporterEmail===currentUser.email){
      myReports.innerHTML+=`
      <div class="report-item" onclick="viewReport('${doc.id}')">
      📄 ${r.crime}
      </div>`;
    }
  });
 });
}

// POLICE REALTIME
function realtime(){
 onSnapshot(collection(db,"reports"),(snap)=>{
  allReports=[];
  reportsDiv.innerHTML="";

  snap.forEach(doc=>{
    const r={id:doc.id,...doc.data()};
    allReports.push(r);

    reportsDiv.innerHTML+=`
    <div class="report-item" onclick="viewReport('${r.id}')">
    📄 ${r.crime} - ${r.zone}
    </div>`;
  });

  notify.innerText=allReports.length;
 });
}

// VIEW REPORT
window.viewReport=function(id){
 const r=allReports.find(x=>x.id===id);

 if(!r){
  alert("❌ not found");
  return;
 }

 const w=window.open();
 w.document.write(`
 <h2>📄 ሪፖርት</h2>
 <p>ክልል: ${r.region||""}</p>
 <p>ዞን: ${r.zone||""}</p>
 <p>ወረዳ: ${r.wereda||""}</p>
 <p>ወንጀል: ${r.crime||""}</p>
 <p>መግለጫ: ${r.desc||""}</p>
 <button onclick="print()">Print</button>
 `);
};

</script>
</body>
</html>
