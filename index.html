<!DOCTYPE html>
<html lang="am">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Police Dashboard</title>

<style>
body{margin:0;font-family:'Segoe UI',sans-serif;background:#f4f6f9}
.header{background:linear-gradient(90deg,#0f2027,#203a43,#2c5364);color:white;padding:20px;text-align:center}
.header h1{margin:0;font-size:26px}
.header p{color:gold;font-weight:bold}
.container{display:flex}
.sidebar{width:220px;background:#1e2a38;color:white;height:100vh;padding:20px}
.sidebar button{width:100%;padding:10px;margin:10px 0;border:none;background:#34495e;color:white;cursor:pointer;border-radius:5px}
.sidebar button:hover{background:#16a085}
.main{flex:1;padding:20px}
.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:20px}
.card{background:white;padding:20px;border-radius:10px;box-shadow:0 2px 8px rgba(0,0,0,0.1)}
.report-item{background:white;padding:15px;margin:10px 0;border-radius:8px;cursor:pointer;box-shadow:0 2px 5px rgba(0,0,0,0.1)}
.report-item:hover{background:#ecf0f1}
.new{color:red;font-weight:bold}
.logout{background:red !important}
</style>
</head>

<body>

<div class="header">
  <h1>🇪🇹 የፖሊስ ሪፖርት ስርዓት</h1>
  <p>ቤንሻንጉል ጉምዝ ክልል ፖሊስ ኮሚሽን እና ሰላም ግንባታና ፀጥታ ቢሮ</p>
</div>

<div class="container">

<div class="sidebar">
  <h3>📋 Menu</h3>
  <button onclick="showSection('dashboard')">📊 Dashboard</button>
  <button onclick="showSection('reports')">📄 Reports</button>
  <button onclick="logout()" class="logout">🚪 Logout</button>
</div>

<div class="main">

<div id="dashboard">
  <div class="cards">
    <div class="card"><h2>📄 ጠቅላላ</h2><p id="totalReports">0</p></div>
    <div class="card"><h2>🚨 ከባድ</h2><p id="serious">0</p></div>
    <div class="card"><h2>🟡 ቀላል</h2><p id="light">0</p></div>
    <div class="card"><h2>📍 Zones</h2><p id="zones">0</p></div>
  </div>
</div>

<div id="reports" style="display:none">
  <h2>📄 የተላኩ ሪፖርቶች</h2>
  <div id="reportList"></div>
</div>

</div>
</div>

<script>

function showSection(sec){
  document.getElementById('dashboard').style.display='none';
  document.getElementById('reports').style.display='none';
  document.getElementById(sec).style.display='block';
}

function logout(){
  localStorage.removeItem('user');
  location.href='index.html'; // redirect to login page
}

// safer data structure (avoid undefined)
let reports = JSON.parse(localStorage.getItem('reports') || '[]');

function loadReports(){
  const list=document.getElementById('reportList');
  list.innerHTML='';

  if(!reports.length){
    list.innerHTML="<p>ምንም ሪፖርት የለም</p>";
    return;
  }

  // newest first
  reports.sort((a,b)=> new Date(b.date) - new Date(a.date));

  reports.forEach((r)=>{
    list.innerHTML += `
    <div class='report-item'>
      📄 ${r.crime || '---'} (${r.zone || '---'})<br>
      🕒 ${r.date ? new Date(r.date).toLocaleString() : ''}
      ${r.new ? "<span class='new'> NEW</span>" : ""}
    </div>`;
  });

  document.getElementById('totalReports').innerText=reports.length;
  document.getElementById('serious').innerText=reports.filter(r=>r.level==='heavy').length;
  document.getElementById('light').innerText=reports.filter(r=>r.level==='light').length;
  document.getElementById('zones').innerText=[...new Set(reports.map(r=>r.zone))].length;
}

loadReports();

</script>

</body>
</html>
